<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itqani — Traduction en direct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="status-bar">
    <div id="status-indicator">
      <div id="status-dot"></div>
      <span id="status-label">Connexion</span>
    </div>
    <span id="clock"></span>
  </div>

  <div id="waiting">
    <div class="waiting-bars">
      <span></span><span></span><span></span><span></span>
    </div>
    <div id="waiting-text">En attente de traduction</div>
  </div>

  <div id="stage">
    <div id="scroll-container"></div>
  </div>

  <script>
    const scroller   = document.getElementById('scroll-container');
    const statusDot  = document.getElementById('status-dot');
    const statusLbl  = document.getElementById('status-label');
    const clockEl    = document.getElementById('clock');
    const waitingEl  = document.getElementById('waiting');

    // ── Horloge ─────────────────────────────────────────────────
    function tick() {
      clockEl.textContent = new Date().toLocaleTimeString('fr-FR',
        { hour: '2-digit', minute: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);

    // ── État ─────────────────────────────────────────────────────
    let active       = null;   // chunk en cours de streaming
    let ws           = null;
    let retryDelay   = 1000;
    let firstContent = false;
    const MAX_DELAY  = 30000;
    const MAX_CHUNKS = 40;     // garder assez de texte pour relire

    // ── Helpers ─────────────────────────────────────────────────
    function hideWaiting() {
      if (!firstContent) {
        firstContent = true;
        waitingEl.classList.add('hidden');
      }
    }

    function scrollToBottom() {
      // Smooth scroll vers le dernier chunk
      scroller.scrollTo({
        top: scroller.scrollHeight,
        behavior: 'smooth'
      });
    }

    function cleanup() {
      const all = scroller.querySelectorAll('.chunk');
      if (all.length > MAX_CHUNKS) {
        for (let i = 0; i < all.length - MAX_CHUNKS; i++) {
          all[i].remove();
        }
      }
    }

    // ── Finaliser le chunk actif ────────────────────────────────
    function finalizeActive() {
      if (!active) return;
      active.classList.remove('active');
      active.classList.add('done');
      active = null;
      cleanup();
    }

    // ── Créer un nouveau chunk actif ────────────────────────────
    function createActive() {
      finalizeActive();
      hideWaiting();

      const div = document.createElement('div');
      div.className = 'chunk active';
      scroller.appendChild(div);
      active = div;

      requestAnimationFrame(scrollToBottom);
      return div;
    }

    // ── WebSocket messages ──────────────────────────────────────
    function handleMessage(event) {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'token') {
        if (!active) createActive();
        active.textContent += msg.content;
        // Scroll continu pendant le streaming
        requestAnimationFrame(scrollToBottom);

      } else if (msg.type === 'chunk_end') {
        if (active) active.textContent = msg.content;
        finalizeActive();
        requestAnimationFrame(scrollToBottom);

      } else if (msg.type === 'error') {
        const el = createActive();
        el.textContent = msg.content;
        el.classList.add('error');
        setTimeout(finalizeActive, 5000);
      }
    }

    // ── WebSocket connexion ─────────────────────────────────────
    function setStatus(on) {
      statusDot.classList.toggle('connected', on);
      statusLbl.textContent = on ? 'En direct' : 'Reconnexion';
      statusLbl.classList.toggle('live', on);
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.addEventListener('open',    () => { setStatus(true);  retryDelay = 1000; });
      ws.addEventListener('message', handleMessage);
      ws.addEventListener('close',   () => { setStatus(false); setTimeout(connect, retryDelay); retryDelay = Math.min(retryDelay * 2, MAX_DELAY); });
      ws.addEventListener('error',   () => ws.close());
    }

    connect();
  </script>
</body>
</html>
