<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itqani — Traduction en direct</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-label">Déconnecté</span>
    <span id="clock"></span>
  </div>

  <!--
    #stage : flex-column + justify-content:flex-end
    → Le dernier chunk est TOUJOURS en bas.
    → Les anciens chunks remontent automatiquement et débordent hors du haut (overflow:hidden).
    → Le dégradé #stage::before masque les chunks qui disparaissent en haut.
    Comportement identique à un vrai téléprompter.
  -->
  <div id="stage"></div>

  <script>
    const stage     = document.getElementById('stage');
    const statusDot = document.getElementById('status-dot');
    const statusLbl = document.getElementById('status-label');
    const clockEl   = document.getElementById('clock');

    // ── Horloge ──────────────────────────────────────────────────────
    function updateClock() {
      clockEl.textContent = new Date().toLocaleTimeString('fr-FR', {
        hour: '2-digit', minute: '2-digit'
      });
    }
    updateClock();
    setInterval(updateClock, 30000);

    // ── État ─────────────────────────────────────────────────────────
    let activeChunk = null;
    let ws          = null;
    let retryDelay  = 1000;
    const MAX_DELAY = 30000;
    const PAST = ['past-1', 'past-2', 'past-3', 'past-4', 'past-old'];

    // ── Vieillissement des chunks ─────────────────────────────────────
    // Décale chaque chunk d'un cran vers le passé (past-1→past-2, etc.)
    // Les chunks en past-old sont supprimés après la transition CSS.
    function ageAllPast() {
      // Itérer du plus ancien au plus récent (reverse) pour éviter les doublons
      [...stage.querySelectorAll('.chunk:not(.active)')].reverse().forEach(el => {
        for (let i = PAST.length - 1; i >= 0; i--) {
          if (el.classList.contains(PAST[i])) {
            if (i === PAST.length - 1) {
              // Était past-old : supprimer après la fin de la transition opacity
              setTimeout(() => el.remove(), 1000);
            } else {
              el.classList.replace(PAST[i], PAST[i + 1]);
            }
            break;
          }
        }
      });
    }

    // ── Finaliser le chunk actif → le déclasser en past-1 ────────────
    function finalizeActive() {
      if (!activeChunk) return;
      const chunk = activeChunk;
      activeChunk = null;
      ageAllPast();
      chunk.classList.remove('active');
      chunk.classList.add('past-1');
    }

    // ── Créer un nouveau chunk actif en bas de scène ──────────────────
    function createActive() {
      finalizeActive();
      const div = document.createElement('div');
      div.className = 'chunk active';
      stage.appendChild(div);  // ajouté en bas → reste en bas grâce à flex-end
      activeChunk = div;
      return div;
    }

    // ── Messages WebSocket ────────────────────────────────────────────
    function handleMessage(event) {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'token') {
        if (!activeChunk) createActive();
        activeChunk.textContent += msg.content;

      } else if (msg.type === 'chunk_end') {
        // Remplace le texte streamé par la version finale propre
        if (activeChunk) activeChunk.textContent = msg.content;
        finalizeActive();

      } else if (msg.type === 'error') {
        const errChunk = createActive();
        errChunk.textContent = '⚠ ' + msg.content;
        errChunk.classList.add('error');
        // Disparaît automatiquement après 5s
        setTimeout(finalizeActive, 5000);
      }
    }

    // ── Connexion WebSocket avec reconnexion automatique ──────────────
    function setStatus(connected) {
      statusDot.classList.toggle('connected', connected);
      statusLbl.textContent = connected ? 'En direct' : 'Reconnexion…';
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.addEventListener('open', () => { setStatus(true); retryDelay = 1000; });
      ws.addEventListener('message', handleMessage);
      ws.addEventListener('close', () => {
        setStatus(false);
        setTimeout(connect, retryDelay);
        retryDelay = Math.min(retryDelay * 2, MAX_DELAY);
      });
      ws.addEventListener('error', () => ws.close());
    }

    connect();
  </script>
</body>
</html>
